   returns {x,y,w,h,pressed} inner content rect so callers can place icon+label. */
function rivetBtn(x,y,w,h,bcol,fill){fill=fill||C.white;
 const pr=G.t-pressT,pressed=pr>=0&&pr<0.14&&pressFx>=x&&pressFx<=x+w&&pressFy>=y&&pressFy<=y+h;
 const dk=lerpCol(bcol,C.ink,0.55),lt=lerpCol(bcol,'#ffffff',0.34);// dark = purple-tinted, never pure black
 rect(x,y,w,h,dk);                                   // outer dark border
 rect(x+1,y+1,w-2,h-2,bcol);                         // colored band
 rect(x+2.5,y+2.5,w-5,h-5,lt);                       // inner light border
 const ix=x+3.5,iy=y+3.5,iw=w-7,ih=h-7;
 const fc=pressed?lerpCol(fill,C.ink,0.14):fill,fcLo=lerpCol(fc,C.ink,0.15),hh=Math.ceil(ih/2);
 rect(ix,iy,iw,hh,fc);rect(ix,iy+hh,iw,ih-hh,fcLo);  // crisp 2-tone plastic face (lighter top / darker bottom)
 if(!pressed){frect(ix,iy,iw,1,'#fffaf0');frect(ix,iy,1,ih,lerpCol(fc,'#ffffff',0.5));      // top+left highlight
  frect(ix,iy+ih-1,iw,1,lerpCol(fc,C.ink,0.3));frect(ix+iw-1,iy,1,ih,lerpCol(fc,C.ink,0.3));}// bottom+right shadow
 else frect(ix,iy,iw,1.4,lerpCol(fc,C.ink,0.3));
 const rv=(rx,ry)=>{rect(rx-1.5,ry-1.5,3,3,dk);frect(rx-0.5,ry-0.5,1.5,1.5,lt);};// tactile rivets
 rv(x+3,y+3);rv(x+w-3,y+3);rv(x+3,y+h-3);rv(x+w-3,y+h-3);
 return {x:ix,y:iy,w:iw,h:ih,pressed};}
/* polished pixel-art gold coin with shine + engraved currency mark */
function drawCoin(cx,cy,r){
 ctx.beginPath();ctx.arc(cx,cy,r,0,6.2832);ctx.fillStyle=C.ink;ctx.fill();         // hard outline
 ctx.beginPath();ctx.arc(cx,cy,r-0.8,0,6.2832);ctx.fillStyle=C.gold2;ctx.fill();   // rim
 ctx.beginPath();ctx.arc(cx,cy,r-2,0,6.2832);ctx.fillStyle=C.gold;ctx.fill();      // body
 ctx.beginPath();ctx.arc(cx,cy,r-3,0,6.2832);ctx.fillStyle='#ffe27a';ctx.fill();   // inner disc
 frect(cx-0.9,cy-r+2.4,1.8,(r-2.4)*2,C.gold2);                                      // engraved bar
 frect(cx-(r-2.4),cy-0.9,(r-2.4)*2,1.8,C.gold2);
 frect(cx-r*0.55,cy-r*0.6,r*0.45,r*0.4,'#fff3c8');}                                 // hard shine
/* scalloped / jagged "wave" trim hanging below a bar (cute valance) */
function scallopTrim(x,y,w,col,edge){col=col||C.tan;edge=edge||C.gold2;const t=4;
 for(let fx=x;fx<x+w;fx+=t)tri(fx,y,Math.min(fx+t,x+w),y,fx+t/2,y+3,col);
 frect(x,y-1,w,1,edge);}
/* ===== TAMAGOTCHI LCD AESTHETIC ===== */
/* scalloped star-burst bezel around an LCD rect (x,y,w,h) */
function drawBezel(x,y,w,h,col,col2){col=col||'#ff9bd0';col2=col2||'#d76fae';const m=6;
 const L=x-m,T=y-m,R=x+w+m,B=y+h+m;
 ctx.fillStyle=col2;roundRectPath(L-1,T-1,(R-L)+2,(B-T)+2,5);ctx.fill();
 // triangular teeth around the 4 sides
 ctx.fillStyle=col;const tn=4,th=4;
 for(let i=0;i<tn;i++){const fx=L+ (R-L)*(i+0.5)/tn;
  tri(fx-3,T,fx+3,T,fx,T-th,col);tri(fx-3,B,fx+3,B,fx,B+th,col);}
 const tv=4;for(let i=0;i<tv;i++){const fy=T+(B-T)*(i+0.5)/tv;
  tri(L,fy-3,L,fy+3,L-th,fy,col);tri(R,fy-3,R,fy+3,R+th,fy,col);}
 ctx.fillStyle=col;roundRectPath(L,T,R-L,B-T,5);ctx.fill();
 // bevels
 ctx.fillStyle='rgba(255,255,255,.5)';roundRectPath(L,T,R-L,2,2);ctx.fill();
 ctx.fillStyle=col2;roundRectPath(L,B-2,R-L,2,2);ctx.fill();
 // inner LCD recess border
 ctx.fillStyle=C.ink;ctx.fillRect(x-1,y-1,w+2,h+2);}
function tri(ax,ay,bx,by,cx2,cy2,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cx2,cy2);ctx.closePath();ctx.fill();}
function roundRectPath(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
/* swirly wavy LCD background (clipped to x,y,w,h) */
function lcdSwirl(x,y,w,h,t,c1,c2){c1=c1||'#cfe9c0';c2=c2||'#e9d6c0';
 ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
 rect(x,y,w,h,c1);
 for(let yy=0;yy<h;yy+=2){const off=Math.sin(yy*0.13+t*1.1)*6;
  for(let xx=-8;xx<w+8;xx+=2){const band=Math.floor((xx+off+yy*0.4)/7)%2;
   if(band===0)frect(x+xx,y+yy,2,2,c2);}}
 ctx.restore();}
/* argyle / diamond LCD background */
function lcdArgyle(x,y,w,h,cols){cols=cols||['#cfe1e9','#e9cfd9','#dfe9cf'];
 ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();rect(x,y,w,h,cols[0]);
 const s=14;for(let gy=-s;gy<h+s;gy+=s)for(let gx=-s;gx<w+s;gx+=s){
  const c=cols[((gx/s+gy/s)|0)%2?1:2];ctx.fillStyle=c;
  ctx.beginPath();ctx.moveTo(x+gx+s/2,y+gy);ctx.lineTo(x+gx+s,y+gy+s/2);ctx.lineTo(x+gx+s/2,y+gy+s);ctx.lineTo(x+gx,y+gy+s/2);ctx.closePath();ctx.fill();}
 ctx.restore();}
/* classic tamagotchi icon glyphs (drawn in an ~sz box at x,y) */
function tamaIcon(k,x,y,sz,col){col=col||C.ink;sz=sz||10;const u=sz/10;
 if(k==='feed'){frect(x+1*u,y+1*u,1.4*u,5*u,col);frect(x+2.6*u,y+1*u,1.4*u,5*u,col);frect(x+1*u,y+1*u,3*u,1*u,col);// fork
  frect(x+6*u,y+1*u,1.4*u,8*u,col);frect(x+5*u,y+1*u,3.4*u,2.5*u,col);}// knife
 else if(k==='light'){frect(x+3*u,y+1*u,4*u,4*u,col);frect(x+2*u,y+2*u,6*u,3*u,col);frect(x+3.5*u,y+5*u,3*u,2*u,col);frect(x+4*u,y+7*u,2*u,1.5*u,col);
  frect(x+0.5*u,y+3*u,1.5*u,0.8*u,col);frect(x+8*u,y+3*u,1.5*u,0.8*u,col);}// bulb + rays
 else if(k==='game'){ctx.save();ctx.translate(x+5*u,y+5*u);ctx.rotate(-0.5);frect(-1*u,-4*u,2*u,8*u,col);frect(-3*u,2*u,6*u,2.5*u,col);ctx.restore();}// bat+ball
 else if(k==='connect'){frect(x+2*u,y+1*u,2*u,4*u,col);frect(x+6*u,y+1*u,2*u,4*u,col);frect(x+2*u,y+5*u,6*u,2*u,col);frect(x+4.5*u,y+7*u,1*u,2.5*u,col);}// plug
 else if(k==='duck'){frect(x+2*u,y+3*u,5*u,4*u,col);frect(x+5*u,y+1.5*u,3*u,3*u,col);frect(x+7.5*u,y+2.5*u,2*u,1*u,col);frect(x+3*u,y+7*u,3*u,1.5*u,col);}// duck
 else if(k==='bread'){frect(x+1.5*u,y+3*u,7*u,5*u,col);frect(x+2.5*u,y+1.5*u,5*u,2*u,col);}// loaf
 else if(k==='pac'){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(x+5*u,y+5*u);ctx.arc(x+5*u,y+5*u,4*u,0.5,5.78);ctx.closePath();ctx.fill();}// pac
 else if(k==='train'){ctx.strokeStyle=col;ctx.lineWidth=1.4*u;ctx.beginPath();ctx.arc(x+3.2*u,y+5*u,2.2*u,0,6.28);ctx.arc(x+6.8*u,y+5*u,2.2*u,0,6.28);ctx.stroke();}// infinity/training
 else if(k==='wash'){frect(x+4*u,y+0.5*u,2*u,3*u,col);frect(x+2.5*u,y+3*u,5*u,3*u,col);frect(x+3.5*u,y+6*u,3*u,1.5*u,col);
  frect(x+1*u,y+7*u,1*u,2*u,col);frect(x+4.5*u,y+8*u,1*u,1.5*u,col);frect(x+8*u,y+7*u,1*u,2*u,col);}// shower drops
 else if(k==='shop'){frect(x+2*u,y+3.5*u,6*u,5.5*u,col);frect(x+3*u,y+1.5*u,1.2*u,2.5*u,col);frect(x+5.8*u,y+1.5*u,1.2*u,2.5*u,col);frect(x+3*u,y+1.5*u,4*u,1.2*u,col);}}// bag
function lerp(a,b,t){return a+(b-a)*t;}
function cl(v,a,b){return v<a?a:v>b?b:v;}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}

/* ===== AUDIO ===== */
let AC=null;const Aud={music:true,sfx:true,voice:true};
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function nf(m){return 440*Math.pow(2,(m-69)/12);}
function blip(m,dur,type,vol,when,force){if(!force&&!Aud.sfx)return;const c=ac(),o=c.createOscillator(),g=c.createGain();
 const t=when||c.currentTime;o.type=type||'square';o.frequency.setValueAtTime(nf(m),t);
 g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol||.06,t+.01);
 g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur+.02);}
function noise(dur,vol){if(!Aud.sfx)return;const c=ac();const b=c.createBuffer(1,c.sampleRate*dur,c.sampleRate);
 const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
 const s=c.createBufferSource();s.buffer=b;const g=c.createGain();g.gain.value=vol||.05;s.connect(g).connect(c.destination);s.start();}

   step++;t0+=spb;}}
 function start(n){if(!Aud.music)return;stop();song=n;step=0;t0=ac().currentTime+.05;timer=setInterval(sched,60);}

const PT=[];function burst(x,y,col,n,spd){for(let i=0;i<(n||8);i++){const a=Math.random()*6.28,s=(spd||40)*(.4+Math.random());
 PT.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-20,life:.5+Math.random()*.4,col,sz:1+(Math.random()*2|0)});}}
function ptUpd(dt){for(let i=PT.length-1;i>=0;i--){const p=PT[i];p.vy+=160*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)PT.splice(i,1);}}
function ptDraw(){for(const p of PT){ctx.globalAlpha=Math.min(1,p.life*2);rect(p.x,p.y,p.sz,p.sz,p.col);}ctx.globalAlpha=1;}
const POPS=[];function pop(x,y,txt,col,sc){POPS.push({x,y,txt,col:col||C.white,life:.9,sc:sc||1});}
function popUpd(dt){for(let i=POPS.length-1;i>=0;i--){const p=POPS[i];p.y-=24*dt;p.life-=dt;if(p.life<=0)POPS.splice(i,1);}}
function popDraw(){for(const p of POPS){ctx.globalAlpha=Math.min(1,p.life*2);textC(p.txt,p.x,p.y,p.col,p.sc);}ctx.globalAlpha=1;}

/* ===== CREATURE DRAW (with accessories) ===== */
const PET_FEET=H-40;
const BODY_OUT='#15315c';
const BODIES={bunny:{tw:.92,th:1.0,ears:1,leg:1.0},round:{tw:1.02,th:.96,leg:.9},
 tall:{tw:.8,th:1.22,leg:1.15},chubby:{tw:1.14,th:.92,leg:.72,pear:1}};
/* thick-outlined vibrant shapes (reference art style) */
// hand-drawn blob: wobbly perimeter + variable-thickness outline (stable per-shape seed, no walk shimmer)
function thickEll(cx,cy,rw,rh,fill,lw,rot){ctx.save();ctx.translate(cx,cy);if(rot)ctx.rotate(rot);
 const seed=(rw*2.7+rh*1.7)%6.283,N=18,pts=[];
 for(let i=0;i<N;i++){const a=i/N*6.283,wob=1+0.06*Math.sin(3*a+seed)+0.035*Math.sin(7*a+seed*1.7);
  pts.push([Math.cos(a)*rw*wob,Math.sin(a)*rh*wob]);}
 ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<N;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();
 ctx.fillStyle=fill;ctx.fill();
 ctx.strokeStyle=BODY_OUT;ctx.lineCap='round';ctx.lineJoin='round';
 for(let i=0;i<N;i++){const a=i/N*6.283,p=pts[i],q=pts[(i+1)%N];
  ctx.lineWidth=lw*(0.62+0.6*(0.5+0.5*Math.sin(2*a+seed*1.3)));// thick-thin variation
  ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(q[0],q[1]);ctx.stroke();}
 ctx.restore();}
function thickLimb(x1,y1,x2,y2,fill,w){ctx.lineCap='round';ctx.lineJoin='round';
 const mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;
 const nx=-dy/len,ny=dx/len,seed=(x1*0.6+y2*1.1+len)%6.283,bow=Math.sin(seed)*len*0.08;// gentle hand-drawn curve
 const cxp=mx+nx*bow,cyp=my+ny*bow;
 ctx.strokeStyle=BODY_OUT;ctx.lineWidth=w+Math.max(2,w*0.7);ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cxp,cyp,x2,y2);ctx.stroke();
 ctx.strokeStyle=fill;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cxp,cyp,x2,y2);ctx.stroke();}
function creatureAnchors(cx,feetY,scale,t,opts){const P=activePet();const bt=BODIES[P.body]||BODIES.round;
 const s=scale,sq=opts.squash||0;
 const col=P.bodyCol||'#ff9bd0',col2=P.bodyCol2||'#d76fae';
 const lw=Math.max(1.5,2.4*s);
 const hH=40*s*(1-sq*0.6),hW=hH*cl(petAspect(),0.74,1.0)*(1+sq*0.5);
 const tW=30*s*bt.tw*(1+sq*0.3),tH=28*s*bt.th*(1-sq*0.3);
 const legLen=9*s*bt.leg;
 const lift=opts.hop||0;
 const bodyBob=(opts.walking?Math.abs(Math.sin(t*8))*1.2*s:0)+Math.sin(t*2.5)*0.5*s;
 const footY=feetY-lift;
 const legTopY=footY-legLen;
 const torsoBottomY=legTopY+4*s-bodyBob;
 const torsoTopY=torsoBottomY-tH;
 const torsoCy=(torsoTopY+torsoBottomY)/2;
 const headBottomY=torsoTopY+7*s;
 const headCy=headBottomY-hH/2,headTopY=headCy-hH/2;
 const shoulderY=torsoTopY+tH*0.30;
 return{cx,s,lw,col,col2,bt,P,sq,
  hW,hH,headCx:cx,headCy,headTopY,
  tW,tH,torsoCy,torsoTopY,torsoBottomY,
  shoulderY,legLen,legTopY,footY,
  footLx:cx-tW*0.26,footRx:cx+tW*0.26};}
function drawCreature(cx,feetY,scale,t,opts){opts=opts||{};
 const A=creatureAnchors(cx,feetY,scale,t,opts);const s=A.s;
 shadowEl(cx,feetY+1,A.tW*0.55,3*s|0,'rgba(20,18,31,.42)');
 const lsw=opts.walking?Math.sin(t*8)*3*s:0,asw=opts.walking?Math.sin(t*8)*2*s:0;
 const dg=opts.dangle||0,dgy=opts.dangle?2*s:0;// limbs trail when the pet is held/dragged
 // legs (behind torso)
 thickLimb(A.footLx,A.torsoBottomY-2*s,A.footLx-lsw+dg,A.footY+dgy,A.col,3*s);
 thickLimb(A.footRx,A.torsoBottomY-2*s,A.footRx+lsw+dg*0.7,A.footY+dgy,A.col,3*s);
 thickEll(A.footLx-lsw+dg,A.footY+dgy,4*s,2.3*s,A.col,A.lw);
 thickEll(A.footRx+lsw+dg*0.7,A.footY+dgy,4*s,2.3*s,A.col,A.lw);
 // arms (behind torso) with little hands
 const armLen=10*s,axl=cx-A.tW*0.46,axr=cx+A.tW*0.46;
 thickLimb(axl,A.shoulderY,axl-2*s+dg,A.shoulderY+armLen+asw+dgy,A.col,2.6*s);
 thickLimb(axr,A.shoulderY,axr+2*s+dg,A.shoulderY+armLen-asw+dgy,A.col,2.6*s);
 thickEll(axl-2*s+dg,A.shoulderY+armLen+asw+dgy,2.7*s,2.7*s,A.col,A.lw);
 thickEll(axr+2*s+dg,A.shoulderY+armLen-asw+dgy,2.7*s,2.7*s,A.col,A.lw);
 // torso
 if(A.bt.pear){thickEll(cx,A.torsoCy+A.tH*0.12,A.tW/2,A.tH/2,A.col,A.lw);thickEll(cx,A.torsoCy-A.tH*0.18,A.tW/2*0.82,A.tH/2*0.7,A.col,A.lw);}
 else thickEll(cx,A.torsoCy,A.tW/2,A.tH/2,A.col,A.lw);
 // belly highlight
 ctx.globalAlpha=.5;thickEll(cx,A.torsoCy+A.tH*0.12,A.tW*0.26,A.tH*0.2,A.col2,0.0001);ctx.globalAlpha=1;
 // outfit body layer (over torso, hood behind head)
 if(G.outfit&&G.outfit!=='none')drawOutfit(A);
 // ears (bunny) behind head
 if(A.bt.ears){thickEll(cx-A.hW*0.26,A.headTopY+2*s,3.4*s,9*s,A.col,A.lw,-0.18);
  thickEll(cx+A.hW*0.26,A.headTopY+2*s,3.4*s,9*s,A.col,A.lw,0.18);}
 // head: face photo clipped into a head shape with thick outline
 const rwH=A.hW/2,rhH=A.hH/2;
 thickEll(cx,A.headCy,rwH,rhH,A.col,A.lw);// base head (shows behind photo edges)
 if(petReady()){const P=A.P;ctx.save();ctx.beginPath();ctx.ellipse(cx,A.headCy,rwH-A.lw*0.5,rhH-A.lw*0.5,0,0,6.28);ctx.clip();
  ctx.drawImage(petImg(),0,0,P.nw,P.nh,Math.round(cx-rwH),Math.round(A.headCy-rhH),Math.round(rwH*2),Math.round(rhH*2));ctx.restore();
  ctx.beginPath();ctx.ellipse(cx,A.headCy,rwH,rhH,0,0,6.28);ctx.lineWidth=A.lw;ctx.strokeStyle=BODY_OUT;ctx.stroke();}
 if(opts.sleeping){text('Z',cx+A.hW*.3,A.headTopY-4,C.white,1);text('Z',cx+A.hW*.45,A.headTopY-11,C.white,1);}
 // styled hair from the salon (persists everywhere)
 drawPetHair(cx,A.headCy,A.hW,A.hH);
 // accessories aligned to the face/head box
 drawAcc(cx,A.headTopY,A.hW,A.hH,scale);
}
/* outfits dressed onto the body anchors */
function drawOutfit(A){const o=G.outfit,col=G.outfitCol||'#5288dd';const cx=A.cx,s=A.s;
 const tTop=A.torsoTopY,tBot=A.torsoBottomY,tCy=A.torsoCy,tW=A.tW,tH=A.tH;
 const collarY=tTop+tH*0.30;
 if(o==='heels'||o==='redbottoms'){const sole=o==='redbottoms'?C.red:'#2a2236';
  [A.footLx,A.footRx].forEach(fx=>{ctx.fillStyle='#2a2236';ctx.beginPath();ctx.moveTo(fx-4*s,A.footY-1);ctx.lineTo(fx+4*s,A.footY-1);ctx.lineTo(fx+2*s,A.footY+2*s);ctx.lineTo(fx-3*s,A.footY+2*s);ctx.closePath();ctx.fill();
   frect(fx+1.5*s,A.footY+1*s,1.6*s,2.6*s,sole);frect(fx-4*s,A.footY+1.6*s,8*s,1.4*s,sole);});return;}
 // garment = lower part of torso ellipse, clipped below the collar
 ctx.save();ctx.beginPath();ctx.rect(cx-tW,collarY,tW*2,A.footY-collarY);ctx.clip();
 if(o==='furcoat'){thickEll(cx,tCy,tW/2+1.2*s,tH/2+1.2*s,col,A.lw);
  for(let i=0;i<40;i++){const a=Math.random()*6.28,rr=Math.random();frect(cx+Math.cos(a)*tW*0.4*rr,tCy+Math.sin(a)*tH*0.4*rr,1.4*s,1.4*s,'#ffffff55');}}
 else if(o==='leather'){thickEll(cx,tCy,tW/2,tH/2,'#241c28',A.lw);
  frect(cx-0.7*s,collarY,1.4*s,A.footY-collarY,'#c9962a');for(let i=0;i<4;i++)frect(cx-0.7*s,collarY+3*s+i*5*s,1.4*s,1.4*s,'#f0d070');}
 else if(o==='cheetah'){thickEll(cx,tCy,tW/2*0.96,tH/2,'#e0a23a',A.lw);
  for(let i=0;i<18;i++){const a=Math.random()*6.28,rr=Math.random();frect(cx+Math.cos(a)*tW*0.38*rr,tCy+Math.sin(a)*tH*0.38*rr,2*s,2*s,'#3a2410');}}
 else{thickEll(cx,tCy,tW/2,tH/2,col,A.lw);// tshirt / hoodie / skirt base
  if(o==='hoodie'){frect(cx-1*s,collarY,2*s,A.footY-collarY,'#00000033');frect(cx-tW*0.2,collarY+2*s,1.6*s,7*s,'#ffffffaa');frect(cx+tW*0.2-1.6*s,collarY+2*s,1.6*s,7*s,'#ffffffaa');}
  if(o==='tshirt'){frect(cx-tW/2,collarY,tW,1.6*s,'#ffffff66');}}
 ctx.restore();
 // collar accent on top of clip
 ctx.fillStyle='#ffffff55';
 if(o==='skirt'){// flared skirt over hips
  ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx-tW*0.42,tBot-2*s);ctx.lineTo(cx+tW*0.42,tBot-2*s);ctx.lineTo(cx+tW*0.6,A.footY-1);ctx.lineTo(cx-tW*0.6,A.footY-1);ctx.closePath();ctx.fill();
  ctx.lineWidth=A.lw;ctx.strokeStyle=BODY_OUT;ctx.stroke();
  for(let i=-2;i<=2;i++)frect(cx+i*tW*0.2,tBot-1*s,1*s,A.footY-tBot,'#00000022');}
 if(o==='hoodie'){thickEll(A.headCx,A.headTopY+3*s,A.hW*0.5,4.5*s,col,A.lw);}// hood peeking behind head
}
/* accessories calibrated per-pet via activePet().face anchors */
const DEF_FACE={eyeY:0.45,eLx:0.31,eRx:0.69,lipY:0.77,earY:0.55,earLx:0.055,earRx:0.92,topY:0.0};
function drawAcc(cx,hy,hw,hh,sc){const a=G.acc;const hx=cx-hw/2;const u=Math.max(1,Math.round(hw/26));
 const F=(activePet()&&activePet().face)||DEF_FACE;
 const eyeY=hy+hh*F.eyeY, eLx=hx+hw*F.eLx, eRx=hx+hw*F.eRx;
 const lipY=hy+hh*F.lipY, lipMid=cx, lipHalf=hw*0.15;
 const earY=hy+hh*F.earY, earLx=hx+hw*F.earLx, earRx=hx+hw*F.earRx;
 // BLUSH (soft cheeks under eyes)
 if(a.blush){ctx.globalAlpha=.4;rect(hx+hw*0.16,eyeY+hh*0.10,4*u,3*u,C.pink);rect(hx+hw*0.66,eyeY+hh*0.10,4*u,3*u,C.pink);ctx.globalAlpha=1;}
 // EYELINER (lid line + outward wing)

   rect(ex+wd*4*u,eyeY-2*u,2*u,u,'#150d18');rect(ex+wd*5*u,eyeY-3*u,u,u,'#150d18');});}
 // LASHES (upward flicks on outer top corners)
 if(a.lashes){[[eLx,-1],[eRx,1]].forEach(([ex,wd])=>{for(let i=0;i<4;i++){const lx=ex+wd*(1+i)*u,ly=eyeY-2*u-i*u;

 // GLOSS lips (two-tone with shine)
 if(a.gloss){rect(lipMid-lipHalf,lipY,lipHalf*2,3*u,'#c8506a');
   rect(lipMid-lipHalf,lipY+1*u,lipHalf*2,2*u,'#e0617f');

   rect(lipMid-u,lipY,2*u,u,C.white);}//shine
 // EARRINGS (gold stud + dangle)
 if(a.earrings){[earLx,earRx].forEach(ex=>{rect(ex,earY,2*u,2*u,C.gold);rect(ex,earY,u,u,C.white);
   rect(ex+u*0.3,earY+3*u,u,2*u,C.gold2);rect(ex,earY+5*u,2*u,2*u,C.gold);rect(ex,earY+5*u,u,u,C.white);});}
 // CHAIN (necklace curve under chin + pendant)
 if(a.chain){const ny=hy+hh*0.96;for(let i=-6;i<=6;i++){const tt=i/6;const lx=cx+tt*hw*0.36;const ly=ny+Math.pow(tt,2)*hh*0.06;

   rect(cx-1.5*u,ny+hh*0.07,3*u,3*u,C.gold);rect(cx-u,ny+hh*0.07,u,u,C.white);rect(cx-1.5*u,ny+hh*0.07+2*u,3*u,u,C.gold2);}
 // SHADES (cool sunglasses over eyes, with reflection)
 if(a.shades){const ey=eyeY-3*u,lw=hw*0.34,lh=6*u;
   [hx+hw*0.13,hx+hw*0.53].forEach(lxp=>{rect(lxp,ey,lw,lh,C.ink);rect(lxp+u,ey+u,lw-2*u,lh-2*u,'#21304f');

   rect(hx+hw*0.13+lw,ey+u,hw*0.06,u,C.ink);//bridge
   rect(hx+hw*0.06,ey+u,hw*0.07,u,C.ink);rect(hx+hw*0.87,ey+u,hw*0.07,u,C.ink);}//arms
 // CAP (baseball cap on crown w/ brim + button)
 if(a.cap){const ty=hy+hh*F.topY;rect(cx-hw*0.40,ty,hw*0.80,hh*0.11,C.red);rect(cx-hw*0.40,ty,hw*0.80,2*u,'#ff7d92');
   rect(cx-hw*0.46,ty+hh*0.09,hw*0.40,2.5*u,C.red);rect(cx-hw*0.46,ty+hh*0.09,hw*0.40,u,'#ff7d92');
   rect(cx-u,ty-u,2*u,2*u,'#ff7d92');}

   for(let i=0;i<3;i++){const px=x+i*(w/2.4)+w*0.05;rect(px,y-4*u,3*u,5*u,C.gold);rect(px,y-4*u,u,u,'#fff0b0');}
   rect(cx-u,y-5*u,2*u,2*u,C.red);rect(x+u,y+u,u,u,C.blu);rect(x+w-2*u,y+u,u,u,C.grn);}
 // HALO (floating glowing ring)

   for(let i=0;i<6.28;i+=0.4){rect(cx+Math.cos(i)*hw*0.30-u,y+Math.sin(i)*2.2*u-u,2*u,2*u,i<3.14?C.gold:'#fff0b0');}

function advSwing(vx,dt){const tgt=cl(vx*0.022,-11,11);dragSwingV+=((tgt-dragSwing)*55-dragSwingV*7)*dt;dragSwing+=dragSwingV*dt;}// springy, laggy limb swing
const REST_LIMB={armL:0.4,armR:-0.4,legL:0.18,legR:-0.18,earL:0.22,earR:-0.22};
function mkLimbs(){return{armL:{a:0.4,av:0},armR:{a:-0.4,av:0},legL:{a:0.18,av:0},legR:{a:-0.18,av:0},earL:{a:0.22,av:0},earR:{a:-0.22,av:0}};}
function springLimbs(vx,dt,wave){const sway=cl(-vx*0.0024,-1.1,1.1),sp=58,dp=2.4;
 for(const k in dragLimbs){const L=dragLimbs[k];const isArm=k[0]==='a';
  // idle wave so the pet looks alive while held
  const w=wave?Math.sin(G.t*(isArm?4.5:3)+(k[3]==='R'?1.7:0))*(isArm?0.32:0.12):0;
  const tgt=REST_LIMB[k]+sway*(k[0]==='e'?0.5:1)+w;
  L.av+=(-(L.a-tgt)*sp-L.av*dp)*dt;L.a+=L.av*dt;}}

function drawBBall(x,y,rot){const r=7.5;
 if(BBALL_CV){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.drawImage(BBALL_CV,-r,-r,r*2,r*2);ctx.restore();return;}
 // procedural fallback until the image loads
 ctx.fillStyle=BODY_OUT;ctx.beginPath();ctx.arc(x,y,r+0.9,0,6.28);ctx.fill();
 ctx.fillStyle=C.org;ctx.beginPath();ctx.arc(x,y,r,0,6.28);ctx.fill();
 ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.strokeStyle=C.brown;ctx.lineWidth=1;
 ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.moveTo(0,-r);ctx.lineTo(0,r);
 ctx.moveTo(-r*0.78,-r*0.6);ctx.lineTo(r*0.78,r*0.6);ctx.stroke();ctx.restore();}

 // squash & stretch for smooth, springy motion
 const st=c.jumping?cl(c.vy/BB_JUMP,-1,1)*0.17:Math.sin(G.t*4+c.x)*0.02;
 ctx.scale(1-st*0.55,1+st);
 const up=c.jumping,torsoCy=-12,headCy=-25,ay=up?torsoCy-12:torsoCy+3;
 thickLimb(-5,-5,-5,0,col,3);thickLimb(5,-5,5,0,col,3);

let BG;

const FENCE_R=150;

function initBaseball(){BG={ab:6,hits:0,runs:0,combo:0,score:0,phase:'pitch',pitchSpd:0,

  fielders:FPOS.map(f=>({x:f.x,y:f.y,hx:f.x,hy:f.y,hue:f.hue,tx:f.x,ty:f.y,run:false}))};

function pitch(){const spd=lerp(26,42,Math.random());BG.ball={x:MOUND.x,y:MOUND.y,vy:spd,z:0,vz:0,
  fromMound:true,landed:false,lx:0,ly:0,flyT:0,flyMax:0,fielded:false};BG.phase='pitch';BG.swingT=0;BG.msg='';}
const SWEET_Y=196,SW_WIN=18;
function swing(){const b=BG;if(b.phase!=='pitch'||!b.ball)return;b.swingT=.18;
  const e=cl((b.ball.y-SWEET_Y)/SW_WIN,-1.3,1.3);
  if(Math.abs(e)>1){SFX.miss();b.outcome='STRIKE';b.msg='STRIKE!';b.msgT=1;b.phase='result';b.resultT=1.0;
   b.fielders.forEach(f=>{f.tx=f.hx;f.ty=f.hy;});return;}
  SFX.bat();const acc=1-Math.abs(e);
  const ang=cl(e*0.62+(Math.random()*0.14-0.07),-0.72,0.72);
  const d=lerp(58,FENCE_R+8,acc*acc)*(0.92+Math.random()*0.16);
  const lx=cl(HOME.x+Math.sin(ang)*d,8,W-8), ly=cl(HOME.y-Math.cos(ang)*d,44,HOME.y-10);
  const fly=acc>0.5;
  b.ball.fromMound=false;b.ball.x=HOME.x;b.ball.y=HOME.y-6;b.ball.lx=lx;b.ball.ly=ly;
  b.ball.flyMax=fly?lerp(0.55,1.05,acc):0.35;b.ball.flyT=0;b.ball.fly=fly;b.ball.sx=HOME.x;b.ball.sy=HOME.y-6;

  const fielderD=d; let bases,caught=false,homer=false;
  if(d>=FENCE_R){homer=true;bases=4;}
  else if(fly&&acc>0.5&&acc<0.66){caught=true;bases=0;} // routine fly out window
  else if(d<74)bases=1;else if(d<108)bases=2;else bases=3;

  let nf=null,nd=1e9;for(const f of b.fielders){if(f===b.fielders[1])continue;const dd=dist(f.hx,f.hy,lx,ly);if(dd<nd){nd=dd;nf=f;}}
  b.chaser=nf;b.fielders.forEach(f=>{f.tx=f.hx;f.ty=f.hy;});if(nf){nf.tx=lx;nf.ty=ly;nf.run=true;}
  b.pending={bases,caught,homer,lx,ly};

function baseballOutcomeText(p){if(p.homer)return'HOME RUN!';if(p.caught)return'CAUGHT! OUT';return['','SINGLE!','DOUBLE!','TRIPLE!'][p.bases];}
SCENES.baseball={update(dt){const b=BG;if(b.swingT>0)b.swingT-=dt;if(b.msgT>0)b.msgT-=dt;
  // fielder movement
  for(const f of b.fielders){f.x+=(f.tx-f.x)*Math.min(1,dt*6);f.y+=(f.ty-f.y)*Math.min(1,dt*6);}
  if(b.phase==='pitch'&&b.ball){const o=b.ball;o.y+=o.vy*dt;
    if(o.y>HOME.y+8){SFX.miss();b.outcome='STRIKE';b.msg='STRIKE!';b.msgT=1;b.phase='result';b.resultT=.9;}}
  else if(b.phase==='hit'&&b.ball){const o=b.ball;o.flyT+=dt;const u=o.flyMax>0?o.flyT/o.flyMax:1;
    if(u>=1){o.x=o.lx;o.y=o.ly;o.z=0;if(!o.landed){o.landed=true;resolveHit();}}
    else{o.x=lerp(o.sx,o.lx,u);o.y=lerp(o.sy,o.ly,u);o.z=o.fly?Math.sin(u*Math.PI)*28:Math.sin(u*Math.PI)*5;
     if(Math.random()<dt*30)burst(o.x,o.y-o.z,'#fff',1,10);}
    // runner advances
    updateRunner(dt);}
  else if(b.phase==='runout'){updateRunner(dt);b.resultT-=dt;if(b.resultT<=0)nextAB();}

 draw(){const b=BG;drawBallfield();

   rect(o.x-2,o.y-o.z-2,4,4,C.white);rect(o.x-2,o.y-o.z-2,4,1,'#fff');rect(o.x-2,o.y-o.z+1,4,1,C.red);}

/* ===== COLFAX RUN (Temple-Run style: swipe to dodge, swipe to turn) ===== */
let CR;const HOR=70,GNEAR=H-30;

let runTouch=null;
cv.addEventListener('pointerdown',e=>{if(G.scene==='runner'&&CR&&CR.alive){const r=cv.getBoundingClientRect();
  runTouch={x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H,t:performance.now()};}},{passive:true});
cv.addEventListener('pointerup',e=>{if(G.scene==='runner'&&runTouch&&CR&&CR.alive){const r=cv.getBoundingClientRect();
  const ux=(e.clientX-r.left)/r.width*W,uy=(e.clientY-r.top)/r.height*H;
  runSwipe(ux-runTouch.x,uy-runTouch.y);runTouch=null;}},{passive:true});
function runSwipe(dx,dy){const r=CR;if(!r||!r.alive)return;
 if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){const dir=dx<0?-1:1;
  // if a corner is bending the road, a swipe is read as taking the turn
  if(r.turn&&!r.turn.done){if(dir===r.turn.dir)takeTurn();else missTurn('WRONG WAY!');return;}
  // otherwise: strafe within the road
  r.laneIdx=cl(r.laneIdx+dir,-1,1);SFX.sel();}
 else{if(!r.air){r.air=true;r.airT=0;SFX.jump();}} // tap / swipe up = jump
}
function initRun(){CR={z:0,speed:30,laneIdx:0,lane:W/2,air:false,airT:0,
 curve:0,curveTarget:0,curvePulse:0,curvePulseT:0,curveDir:1,
 obs:[],side:[],spawnZ:4,sideZ:2.5,dist:0,coins:0,score:0,alive:true,
 chaserZ:1.4,hitSlow:0,shake:0,deadT:0,lives:3,iframes:0,
 turn:null,turnTimer:3,heading:0,
 roadSegs:[]};
 for(let i=0;i<6;i++)CR.roadSegs.push({z:i*1.2,curve:(Math.random()-.5)*.5});}
function projP(z){return 1/(1+z*3.2);}
function projY(z){return HOR+(GNEAR-HOR)*projP(z);}
function roadCurveAt(z){const r=CR;let c=0;for(const s of r.roadSegs){const d=z-s.z;if(d>=0&&d<1.2)c+=s.curve*(1-d/1.2);}return c;}
function centerX(z){const p=projP(z);return W/2+roadCurveAt(z)*(1-p)*55+CR.curve*(1-p)*78;}
function halfW(z){return 8+(60-8)*projP(z);}
function laneCenterX(){return centerX(.05)+CR.laneIdx*halfW(.05)*0.5;}
/* successful corner: whip the whole perspective to follow, then straighten */
function takeTurn(){const r=CR;const dir=r.turn.dir;r.turn.done=true;r.turn=null;
 SFX.turn();r.curvePulse=dir*1.5;r.curvePulseT=.7;r.curveTarget=0;
 r.score+=20;r.coins+=1;burst(W/2,HOR+34,C.neon,18,80);pop(W/2,HOR+26,'NICE TURN!',C.neon);
 // skid particles
 for(let i=0;i<8;i++)PT.push({x:r.lane+(Math.random()*10-5),y:GNEAR-6,vx:-dir*(20+Math.random()*30),vy:-Math.random()*10,life:.5,sz:2,col:'#555'});
 r.roadSegs=[{z:r.z*.02+5,curve:0}];}
function missTurn(msg){const r=CR;if(r.turn)r.turn.done=true;r.turn=null;r.curveTarget=0;
 runHit();pop(W/2,GNEAR-40,msg||'MISSED THE TURN!',C.red);}
function spawnRun(){const r=CR;const rx=Math.random();const li=Math.floor(Math.random()*3)-1;
 if(rx<.26)r.obs.push({z:5,li,type:'pole'});
 else if(rx<.46)r.obs.push({z:5,li,type:'mon'});
 else if(rx<.62)r.obs.push({z:5,li,type:'ramp'});
 else{for(let i=0;i<4;i++)r.obs.push({z:5+i*.22,li,type:'coin'});}}
function spawnSide(){const r=CR;[-1,1].forEach(sd=>{if(Math.random()<.7)
 r.side.push({z:5,sd,type:Math.random()<.5?'tree':'light'});});}
SCENES.runner={update(dt){const r=CR;if(!r.alive){r.deadT+=dt;if(r.shake>0)r.shake-=dt;return;}
  const baseSpd=30+r.dist*0.045;r.speed=Math.max(12,baseSpd-(r.hitSlow>0?baseSpd*.55:0));
  if(r.hitSlow>0)r.hitSlow-=dt;
  r.z+=r.speed*dt;r.dist+=r.speed*dt;r.score=Math.floor(r.dist)+r.coins*5;

function initBlackjack(){BJ={phase:'bet',bet:0,deck:bjBuildDeck(),player:[],dealer:[],hidden:true,

function cardAnim(c,tx,ty){const lt=(c.t||0)-(c.delay||0);if(lt<0)return null;const u=Math.min(1,lt/c.dur);

  for(let i=0;i<L;i++){const sx=gel?rxR+Math.cos(ang)*i*SEG:rxR+(Math.random()*0.8-0.4),sy=gel?ryR+Math.sin(ang)*i*SEG:ryR+i*SEG;
   st.push({x:sx,y:sy,px:sx,py:sy,col:base});}
  strands.push(st);}
 // bangs — forehead strands that drape down over the face (style-dependent)
 const bangDefs={straight:{n:50,len:5,spread:0.7},wavy:{n:55,len:6,spread:0.8,curl:0.3},
  curly:{n:60,len:5,spread:0.9,curl:0.7},long:{n:45,len:7,spread:0.6},
  spiky:{n:40,len:4,spread:1.0,gel:1},bob:{n:55,len:4,spread:0.75,curl:0.2}};
 const bd=bangDefs[style]||bangDefs.straight;
 for(let k=0;k<bd.n;k++){const t=k/(bd.n-1);
  const ang=(200+t*140)*Math.PI/180;// forehead arc (~200° to ~340°)
  const rrx=FACE_RX+0.5+((k%3)*0.8),rry=FACE_RY+0.5+((k%3)*0.8);

function updateHair(s,dt){

  if(st.gelled){st[0].x=st.rootx;st[0].y=st.rooty;continue;}
  // ---- Verlet integration: gravity down, velocity = (pos - prevPos)*damp ----

   for(let i=1;i<st.length;i++){const a=st[i-1],b=st[i];let dx=b.x-a.x,dy=b.y-a.y;

    else{a.x+=dx*diff*0.5;a.y+=dy*diff*0.5;b.x-=dx*diff*0.5;b.y-=dy*diff*0.5;}}
   // angular/bending constraints — each joint resists sharp kinks (pulls toward neighbor midline)
   for(let i=1;i<st.length-1;i++){const a=st[i-1],b=st[i],c=st[i+1];
    const mx=(a.x+c.x)*0.5,my=(a.y+c.y)*0.5,k=0.07;b.x+=(mx-b.x)*k;b.y+=(my-b.y)*k;}
   // collision — push points outside the face ellipse so hair drapes around it.
   // BANGS are exempt: they're meant to lie OVER the forehead (drawn on top of the face).
   if(!st.bang)for(let i=1;i<st.length;i++){const p=st[i];const nx=(p.x-cx)/rx,ny=(p.y-cy)/ry;const dd=Math.hypot(nx,ny);

function applyTool(s,dt){const dvx=s.lx-s.plx,dvy=s.ly-s.ply;const tool=s.tool;

/* chunky PIXEL hair: stamp integer-snapped square blocks along each strand (per-segment color) */
function strokeStrand(st,baseW){if(st.length<2)return;
 const cu=st.curl||0,ph=st.phase||0,sz=Math.max(1,Math.round((baseW||1)+0.5));
 for(let i=1;i<st.length;i++){
  let ax=st[i-1].x,ay=st[i-1].y,bx=st[i].x,by=st[i].y;
  if(cu>0.05){const dx=bx-ax,dy=by-ay,L=Math.hypot(dx,dy)||1;
   const offA=Math.sin((i-1)*1.25+ph)*cu*2.4,offB=Math.sin(i*1.25+ph)*cu*2.4;
   if(i>1){ax+=(-dy/L)*offA;ay+=(dx/L)*offA;}bx+=(-dy/L)*offB;by+=(dx/L)*offB;}
  const col=st[i].col,d=Math.hypot(bx-ax,by-ay),steps=Math.max(1,Math.ceil(d/0.85));
  for(let k=0;k<=steps;k++){const t=k/steps;frect(Math.round(ax+(bx-ax)*t),Math.round(ay+(by-ay)*t),sz,sz,col);}}}

 ['CHEETAH','cheetah',45,false],['HEELS','heels',30,false],['RED BOTTOMS','redbottoms',80,false]];
const OUTFIT_COLS=['#5288dd','#e8506b','#a05cf0','#5fdf7a','#f0d070','#222','#fff','#ff5fa8'];
function initClosetOwned(){OUTFITS.forEach(o=>{if(o[2]===0)G.outfitsOwned[o[1]]=true;});}
const OUTFIT_NAME={tshirt:'TSHIRT',hoodie:'HOODIE',skirt:'SKIRT',leather:'LEATHER JACKET',furcoat:'FUR COAT',cheetah:'CHEETAH TANK',heels:'HEELS',redbottoms:'RED BOTTOMS'};
function unlockOutfit(key,why){if(G.outfitsOwned[key])return;G.outfitsOwned[key]=true;
 SFX.score();G.pop={title:'OUTFIT UNLOCKED!',score:(OUTFIT_NAME[key]||key)+(why?' — '+why:''),reward:0};G.popT=2.8;}
/* tiny preview icons for closet outfits + shop accessories (drawn in an ~sz box at x,y) */
function drawOutfitIcon(k,x,y,sz){const u=sz/16,cx=x+sz/2,I=BODY_OUT;ctx.lineJoin='round';
 const body=(col)=>{frect(x+4*u,y+4*u,8*u,9*u,col);frect(x+2*u,y+5*u,3*u,4*u,col);frect(x+11*u,y+5*u,3*u,4*u,col);};// torso+sleeves
 if(k==='none'){ctx.strokeStyle='#9a93b0';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(cx,y+sz/2,5*u,0,6.28);ctx.moveTo(x+4*u,y+4*u);ctx.lineTo(x+12*u,y+12*u);ctx.stroke();}
 else if(k==='tshirt'){body('#5288dd');}
 else if(k==='hoodie'){body('#e8506b');ctx.fillStyle='#c43f59';ctx.beginPath();ctx.arc(cx,y+4*u,3.4*u,Math.PI,0);ctx.fill();}
 else if(k==='skirt'){frect(x+5*u,y+4*u,6*u,3*u,'#a05cf0');ctx.fillStyle='#a05cf0';ctx.beginPath();ctx.moveTo(x+5*u,y+7*u);ctx.lineTo(x+3*u,y+13*u);ctx.lineTo(x+13*u,y+13*u);ctx.lineTo(x+11*u,y+7*u);ctx.closePath();ctx.fill();}
 else if(k==='leather'){body('#2a2a30');frect(cx-0.6*u,y+4*u,1.2*u,9*u,'#888');}
 else if(k==='furcoat'){ctx.fillStyle='#efe3c8';for(let i=0;i<10;i++){const a=i/10*6.28;ctx.beginPath();ctx.arc(cx+Math.cos(a)*5*u,y+8*u+Math.sin(a)*5*u,2.2*u,0,6.28);ctx.fill();}frect(x+5*u,y+5*u,6*u,7*u,'#efe3c8');}
 else if(k==='cheetah'){body('#f0c050');ctx.fillStyle='#5a3a18';for(let i=0;i<5;i++)ctx.fillRect(x+5*u+(i%3)*2.4*u,y+5*u+((i/3)|0)*3*u,1.4*u,1.4*u);}
 else if(k==='heels'){ctx.fillStyle='#ff5fa8';ctx.beginPath();ctx.moveTo(x+3*u,y+10*u);ctx.lineTo(x+12*u,y+10*u);ctx.lineTo(x+12*u,y+12*u);ctx.lineTo(x+6*u,y+12*u);ctx.closePath();ctx.fill();frect(x+11*u,y+12*u,1.4*u,3*u,'#ff5fa8');}
 else if(k==='redbottoms'){ctx.fillStyle='#222';ctx.beginPath();ctx.moveTo(x+3*u,y+9*u);ctx.lineTo(x+12*u,y+9*u);ctx.lineTo(x+12*u,y+11*u);ctx.lineTo(x+6*u,y+11*u);ctx.closePath();ctx.fill();frect(x+3*u,y+11*u,9*u,1.6*u,'#e01030');frect(x+11*u,y+11*u,1.4*u,3*u,'#222');}
 else body('#888');}
function drawAccessoryIcon(k,x,y,sz){const u=sz/16,cx=x+sz/2,cy=y+sz/2;
 if(k==='gloss'){ctx.fillStyle='#ff5fa8';ctx.beginPath();ctx.ellipse(cx,cy,5*u,2.4*u,0,0,6.28);ctx.fill();frect(cx-5*u,cy-0.4*u,10*u,0.8*u,'#c43f7a');}
 else if(k==='earrings'){ctx.fillStyle='#f6d152';ctx.beginPath();ctx.arc(x+5*u,y+5*u,1.6*u,0,6.28);ctx.arc(x+11*u,y+5*u,1.6*u,0,6.28);ctx.fill();frect(x+4.4*u,y+6*u,1.2*u,5*u,'#f6d152');frect(x+10.4*u,y+6*u,1.2*u,5*u,'#f6d152');}
 else if(k==='blush'){ctx.fillStyle='#f0d9c0';ctx.beginPath();ctx.arc(cx,cy,6*u,0,6.28);ctx.fill();ctx.fillStyle='#ff9bb8';ctx.beginPath();ctx.arc(cx-3*u,cy+1*u,1.8*u,0,6.28);ctx.arc(cx+3*u,cy+1*u,1.8*u,0,6.28);ctx.fill();}
 else if(k==='lashes'){ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(cx,cy,5*u,3*u,0,0,6.28);ctx.fill();ctx.fillStyle='#3a2a22';ctx.beginPath();ctx.arc(cx,cy,1.8*u,0,6.28);ctx.fill();ctx.strokeStyle=BODY_OUT;ctx.lineWidth=1*u;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(cx+i*2*u,cy-2.6*u);ctx.lineTo(cx+i*2*u,cy-4.6*u);ctx.stroke();}}
 else if(k==='chain'){ctx.strokeStyle='#f6d152';ctx.lineWidth=1.6*u;ctx.beginPath();ctx.arc(cx,y+5*u,5*u,0.15*Math.PI,0.85*Math.PI);ctx.stroke();ctx.fillStyle='#f6d152';ctx.beginPath();ctx.arc(cx,y+11*u,1.6*u,0,6.28);ctx.fill();}
 else if(k==='liner'){ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(cx,cy,5*u,3*u,0,0,6.28);ctx.fill();ctx.fillStyle='#3a2a22';ctx.beginPath();ctx.arc(cx,cy,1.8*u,0,6.28);ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=1.4*u;ctx.beginPath();ctx.moveTo(cx-5*u,cy-2*u);ctx.lineTo(cx+6*u,cy-3.4*u);ctx.stroke();}
 else if(k==='cap'){ctx.fillStyle='#e8506b';ctx.beginPath();ctx.arc(cx,y+8*u,5*u,Math.PI,0);ctx.fill();frect(cx,y+7.4*u,7*u,1.6*u,'#c43f59');}
 else if(k==='shades'){ctx.fillStyle='#222';frect(x+2*u,y+6*u,5*u,4*u,'#222');frect(x+9*u,y+6*u,5*u,4*u,'#222');frect(x+7*u,y+7*u,2*u,1*u,'#222');ctx.fillStyle='#6cf';frect(x+2.6*u,y+6.6*u,1.6*u,1.2*u,'#6cf');frect(x+9.6*u,y+6.6*u,1.6*u,1.2*u,'#6cf');}
 else if(k==='crown'){ctx.fillStyle='#f6d152';ctx.beginPath();ctx.moveTo(x+3*u,y+12*u);ctx.lineTo(x+3*u,y+6*u);ctx.lineTo(x+6*u,y+9*u);ctx.lineTo(cx,y+4*u);ctx.lineTo(x+10*u,y+9*u);ctx.lineTo(x+13*u,y+6*u);ctx.lineTo(x+13*u,y+12*u);ctx.closePath();ctx.fill();ctx.fillStyle='#e0102f';ctx.beginPath();ctx.arc(cx,y+10*u,1.2*u,0,6.28);ctx.fill();}
 else if(k==='halo'){ctx.strokeStyle='#ffe98a';ctx.lineWidth=2*u;ctx.beginPath();ctx.ellipse(cx,y+5*u,5*u,2*u,0,0,6.28);ctx.stroke();}
 else{ctx.fillStyle=C.gray;ctx.fillRect(x+4*u,y+4*u,8*u,8*u);}}
SCENES.closet={update(dt){ptUpd(dt);},draw(){drawRoom();
  drawCreature(W/2,FLOOR_Y-2,.78,G.t,{});
  ctx.globalAlpha=.72;rect(0,0,W,H,C.ink);ctx.globalAlpha=1;
  drawCreature(W/2,118,1.0,G.t,{});// preview
  frameWin(8,128,W-16,104);textC('CLOSET',W/2,134,C.yel);
  const colW=(W-22)/3;
  OUTFITS.forEach((o,i)=>{const x=10+(i%3)*(colW+1),y=144+Math.floor(i/3)*24;
   const owned=o[2]===0||G.outfitsOwned[o[1]],on=G.outfit===o[1];
   panel(x,y,colW,22,on?'#3a5a8a':C.cream);drawOutfitIcon(o[1],x+1,y+4,14);
   text(o[0].slice(0,5),x+16,y+3,on?C.white:C.ink);
   if(owned)text('WEAR',x+16,y+12,on?C.yel:C.dgrn);else text('$'+o[2],x+16,y+12,G.coins>=o[2]?C.red:C.dgray);
   btn(x,y,colW,22,()=>{if(owned){G.outfit=on?'none':o[1];SFX.sel();}
    else if(G.coins>=o[2]){G.coins-=o[2];G.outfitsOwned[o[1]]=true;G.outfit=o[1];SFX.coin();burst(W/2,118,C.yel,8,50);}else SFX.miss();});});
  // color customizer
  textC('COLOR',W/2,216,C.white);
  OUTFIT_COLS.forEach((c,i)=>{const x=W/2-(OUTFIT_COLS.length*11)/2+i*11,y=222;
   rect(x,y,9,8,c);rect(x,y,9,1,'#fff6');if(G.outfitCol===c){rect(x-1,y-1,11,1,C.gold);rect(x-1,y+8,11,1,C.gold);}
   btn(x,y,9,9,()=>{SFX.sel();G.outfitCol=c;});});
  backBtn(()=>{G.scene='main';});},tap(){}};

/* SHOP */
SCENES.shop={update(dt){ptUpd(dt);},draw(){rect(0,0,W,H,C.dk);
 panel(2,2,W-4,16);text(activePet().name+' SHOP',6,5,C.ink);const cs='$'+G.coins;text(cs,W-6-tw(cs),5,C.org);
 drawCreature(W/2,72,.7,G.t,{});
 let y=84;const colW=(W-14)/2;
 ACCDEF.forEach((it,idx)=>{const x=6+(idx%2)*(colW+2),yy=y+Math.floor(idx/2)*19;
  const owned=G.owned[it[1]],eq=G.acc[it[1]];panel(x,yy,colW,17);drawAccessoryIcon(it[1],x+2,yy+1,14);
  text(it[0],x+17,yy+5,C.ink);
  if(owned){rect(x+colW-22,yy+3,18,11,eq?C.grn:C.lil);textC(eq?'ON':'OFF',x+colW-13,yy+5,C.ink);
   btn(x,yy,colW,17,()=>{SFX.sel();G.acc[it[1]]=!G.acc[it[1]];if(G.acc[it[1]])say('CUTE!');});}
  else{const can=G.coins>=it[2];rect(x+colW-24,yy+3,20,11,can?C.yel:C.dgray);textC('$'+it[2],x+colW-14,yy+5,C.ink);
   btn(x,yy,colW,17,()=>{if(G.coins>=it[2]){G.coins-=it[2];G.owned[it[1]]=true;G.acc[it[1]]=true;SFX.coin();burst(W/2,72,C.yel,8,50);say('OOH NICE!');}else SFX.miss();});}});
 const sy=H-30;rect(6,sy,W-12,24,'#2a1f3f');rect(6,sy,W-12,1,C.neon);
 textC('SELL '+activePet().name+' TO COLFAX',W/2,sy+5,C.neon);textC('$'+sellPrice()+' (SHADY)',W/2,sy+14,C.gold);
 btn(6,sy,W-12,24,()=>{SFX.sel();enterSell();});
 backBtn(()=>G.scene='main');ptDraw();},tap(){}};
function sellPrice(){let p=120+G.stage*60;ACCDEF.forEach(a=>{if(G.owned[a[1]])p+=12;});return p;}

/* ===== SELL: shady highway night scene ===== */
let SELL;
function enterSell(){SELL={t:0,carX:-40,carT:2.5+Math.random()*3,flick:0,line:0,lineT:0,
  lines:['HEH... NICE LITTLE CREATURE.','I PAY GOOD. NO QUESTIONS.','HAND IT OVER... QUICK NOW.'],done:false};
 Music.start('colfax');SFX.dark();sayDark('come closer');G.scene='sell';}
SCENES.sell={update(dt){const s=SELL;s.t+=dt;s.flick=(Math.random()<dt*3)?(Math.random()*0.5):s.flick*0.9;
  s.lineT+=dt;if(s.lineT>3.4){s.lineT=0;s.line=(s.line+1)%s.lines.length;sayDark(s.lines[s.line]);}
  s.carT-=dt;if(s.carT<=0){s.carX=-40;s.carT=4+Math.random()*4;}
  if(s.carX>-40)s.carX+=dt*180;if(s.carX>W+40)s.carX=-40;
  if(s.carX<=-40&&s.carT<1.2)s.carX=-39;
  ptUpd(dt);popUpd(dt);},
 draw(){const s=SELL,t=s.t;drawHighwayNight(t,s);
  // Mr Colfax under the streetlight
  drawColfaxFigure(W/2+18,168,t,s.flick);
  // little Eevee beside player, looking up
  drawCreature(44,182,.5,t,{});
  // title + dialogue
  textC('MR COLFAX',W/2,30,C.neon,1);
  if(Math.floor(t*1.5)%2===0||true){}
  panel(8,196,W-16,26,'#120f1d',C.neon);
  textC('"'+s.lines[s.line]+'"',W/2,202,C.lil,1);
  textC('$'+sellPrice(),W/2,212,C.gold,1);
  // buttons
  rect(14,H-14,54,11,'#7a1f2f');rect(14,H-14,54,1,C.red);textC('SELL',41,H-11,C.white);btn(14,H-14,54,11,()=>confirmSell());
  rect(W-68,H-14,54,11,'#1f5a2f');rect(W-68,H-14,54,1,C.grn);textC('KEEP',W-41,H-11,C.white);btn(W-68,H-14,54,11,()=>{SFX.back();G.scene='shop';Music.start('room');});},
 tap(){}};
function drawHighwayNight(t,s){
 // sky gradient
 for(let y=0;y<120;y++){const u=y/120;rect(0,y,W,1,u<0.5?C.night:lerpCol(C.night,C.nightlo,(u-0.5)*2));}
 // stars
 for(let i=0;i<34;i++){const x=(i*53)%W,y=(i*29)%108;const tw2=0.4+0.6*Math.abs(Math.sin(t*1.5+i));ctx.globalAlpha=tw2;
  rect(x,y,1,1,i%5?C.white:C.lil);}ctx.globalAlpha=1;
 // moon w/ glow
 ctx.globalAlpha=.18;for(let r=10;r>0;r--)ctx.fillStyle=C.moon,ctx.beginPath(),ctx.arc(128,26,8+r,0,6.28),ctx.fill();
 ctx.globalAlpha=1;rect(124,22,10,10,C.moon);rect(124,22,10,2,'#fff');rect(130,24,3,3,'#cfc9b0');rect(126,28,2,2,'#cfc9b0');
 // distant hills
 ctx.fillStyle='#15122a';ctx.beginPath();ctx.moveTo(0,116);for(let x=0;x<=W;x+=20)ctx.lineTo(x,108-Math.sin(x*0.13)*8);ctx.lineTo(W,116);ctx.closePath();ctx.fill();
 ctx.fillStyle='#1c1838';ctx.beginPath();ctx.moveTo(0,120);for(let x=0;x<=W;x+=16)ctx.lineTo(x,116-Math.sin(x*0.2+2)*5);ctx.lineTo(W,120);ctx.closePath();ctx.fill();
 // road (trapezoid receding to vanishing point at ~ (80,116))
 const vy=116,vx=80;
 ctx.fillStyle=C.tar;ctx.beginPath();ctx.moveTo(vx-6,vy);ctx.lineTo(vx+6,vy);ctx.lineTo(W+30,H);ctx.lineTo(-30,H);ctx.closePath();ctx.fill();
 // road edges
 ctx.strokeStyle='#3a3550';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(vx-6,vy);ctx.lineTo(-30,H);ctx.stroke();ctx.beginPath();ctx.moveTo(vx+6,vy);ctx.lineTo(W+30,H);ctx.stroke();
 // dashed center line (animated, perspective)
 for(let i=0;i<8;i++){const pr=((i+ (t*1.2)%1)/8);const yy=lerp(vy,H,pr*pr);const w=lerp(0.5,5,pr*pr);const hgt=lerp(1,7,pr*pr);
  rect(vx-w/2,yy,w,hgt,C.lane);}
 // passing car
 if(s.carX>-39){const cx=s.carX,cy=128;rect(cx,cy,16,7,'#332b44');rect(cx+2,cy-3,10,4,'#4a4060');
  rect(cx+13,cy+1,3,3,'#fff6c0');rect(cx,cy+1,3,3,'#e8506b');
  ctx.globalAlpha=.25;ctx.fillStyle='#fff6c0';ctx.beginPath();ctx.moveTo(cx+16,cy+1);ctx.lineTo(cx+40,cy-3);ctx.lineTo(cx+40,cy+9);ctx.closePath();ctx.fill();ctx.globalAlpha=1;}
 // streetlight pole + lamp + light cone
 const px=W/2+34,py0=58;rect(px,py0,3,110,'#26222f');rect(px-18,py0-2,22,4,'#26222f');
 const lampX=px-14,lampY=py0;rect(lampX-3,lampY-3,10,5,'#3a3548');
 const lit=0.6+s.flick;ctx.globalAlpha=0.10*lit;ctx.fillStyle='#fff0b0';
 ctx.beginPath();ctx.moveTo(lampX+2,lampY+2);ctx.lineTo(lampX-44,H);ctx.lineTo(lampX+48,H);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
 rect(lampX-2,lampY,8,3,`rgba(255,240,176,${0.6+s.flick})`);
 // ground pool of light
 ctx.globalAlpha=0.12*lit;shadowEl(W/2+18,180,40,10,'#fff0b0');ctx.globalAlpha=1;
 // drifting fog
 for(let i=0;i<4;i++){const fx=((t*8+i*60)%(W+60))-30;ctx.fillStyle=C.fog;ctx.fillRect(fx,150+i*14,50,6);}
}
function lerpCol(a,b,u){const pa=hx2(a),pb=hx2(b);const r=Math.round(lerp(pa[0],pb[0],u)),g=Math.round(lerp(pa[1],pb[1],u)),bl=Math.round(lerp(pa[2],pb[2],u));
 return`rgb(${r},${g},${bl})`;}
function hx2(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function drawColfaxFigure(x,groundY,t,flick){
 const sway=Math.sin(t*1.2)*1.2;x+=sway;
 shadowEl(x,groundY+2,12,3,'rgba(0,0,0,.5)');
 // long trench coat (silhouette)
 ctx.fillStyle='#141022';
 ctx.beginPath();ctx.moveTo(x-9,groundY);ctx.lineTo(x-7,groundY-30);ctx.lineTo(x+7,groundY-30);ctx.lineTo(x+9,groundY);ctx.closePath();ctx.fill();
 // coat shading + lapels
 rect(x-2,groundY-30,4,30,'#1d1730');rect(x-1,groundY-26,2,22,'#0e0b1a');
 // arms / hands holding briefcase
 rect(x-9,groundY-26,3,16,'#141022');rect(x+6,groundY-26,3,16,'#141022');
 rect(x-13,groundY-10,8,7,'#241c1a');rect(x-13,groundY-10,8,1,'#3a2e22');rect(x-10,groundY-9,2,2,C.gold2);// briefcase $ latch
 // neck/shoulders
 rect(x-7,groundY-34,14,5,'#141022');
 // head + face in shadow
 rect(x-5,groundY-44,10,11,'#211a30');
 // glowing eyes (flicker)
 const eg=0.7+flick*0.6;ctx.globalAlpha=Math.min(1,eg);
 rect(x-4,groundY-40,3,2,C.neon);rect(x+1,groundY-40,3,2,C.neon);ctx.globalAlpha=1;
 rect(x-4,groundY-40,1,1,'#fff');rect(x+1,groundY-40,1,1,'#fff');
 // wide-brim fedora
 rect(x-8,groundY-45,16,2,'#0d0a18');rect(x-5,groundY-52,10,7,'#0d0a18');rect(x-5,groundY-46,10,1,'#1d1730');
 // cigarette glow
 if(Math.floor(t*2)%4<3){rect(x+5,groundY-37,2,1,'#ff6a3c');ctx.globalAlpha=.4;rect(x+5,groundY-38,1,1,'#ffb070');ctx.globalAlpha=1;}
 // faint smoke
 for(let i=0;i<3;i++){const sy=groundY-39-i*5-(t*6%5);ctx.globalAlpha=.12;rect(x+6+Math.sin(t*2+i)*2,sy,1,1,'#cfc9d0');ctx.globalAlpha=1;}
}
function confirmSell(){const p=sellPrice();G.coins+=p;SFX.sell();sayDark('pleasure doing business');
 burst(W/2+18,168,'#141022',16,50);
 const c1=pick([C.pink,C.sky,C.lil,C.grn,C.org,C.yel]);const c2=pick([C.pur,C.red,C.dblu,C.dgrn]);
 G.egg={taps:0,need:10,c1,c2,wob:0,shakeT:0};
 G.scene='main';setMusic(Aud.music);
 G.pop={title:'SOLD TO COLFAX',score:'+$'+p,reward:0};G.popT=2.4;}

/* SHARED */
function backBtn(fn){const x=4,y=H-14,w=34,h=11;rect(x,y,w,h,C.red);rect(x,y,w,1,C.pink);textC('BACK',x+w/2,y+3,C.white);
 btn(x,y,w,h,()=>{SFX.back();fn();});}
function drawPopup(){if(G.popT<=0||!G.pop)return;G.popT-=1/30;frameWin(20,92,W-40,52);
 textC(G.pop.title,W/2,100,C.yel);textC(G.pop.score,W/2,114,C.white);
 if(G.pop.reward)textC('+$'+G.pop.reward,W/2,128,C.grn);}

/* ===== LOOP 30fps ===== */
let last=0,accT=0;const STEP=1/60;// whole game targets ~60fps
function loop(now){requestAnimationFrame(loop);if(!last)last=now;let dt=(now-last)/1000;last=now;if(dt>.1)dt=.1;accT+=dt;
 if(accT<STEP)return;const fdt=Math.min(accT,.05);accT=0;G.t+=fdt;regions.length=0;
 if(G.tipT>0&&G.tipT<99){G.tipT-=fdt;if(G.tipT<=0)hoverTip=null;}
 const sc=SCENES[G.scene];if(sc.update)sc.update(fdt);
 ctx.fillStyle=C.ink;ctx.fillRect(0,0,W,H);sc.draw();
 // tactile tap ripple (y2k tap feedback)
 const pr=G.t-pressT;if(pr>=0&&pr<0.22){const a=pr/0.22;ctx.globalAlpha=(1-a)*0.55;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(pressFx,pressFy,1.5+a*9,0,6.28);ctx.stroke();ctx.globalAlpha=1;}}
initClosetOwned();
loadCustomFaces();
requestAnimationFrame(loop);
if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=()=>{};
})();
